name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check workflow YAML
        run: ruby -e 'require "yaml"; %w[ci release].each { |name| YAML.parse_file(".github/workflows/#{name}.yml") }'
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test workspace
        run: cargo test --workspace --locked

  runtime-soak:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Soak shared runtime backpressure and retry invariants
        env:
          RUSTIUM_RUNTIME_SOAK_CYCLES: "256"
        run: >-
          cargo test -p rustium-core --test runtime_soak --locked --
          --ignored --nocapture

  postgresql-cdc:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Test PostgreSQL CDC recovery and extension types
        run: bash scripts/test-postgresql-extensions.sh

  mysql-cdc:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Pull MySQL 8.4
        run: docker pull mysql:8.4
      - name: Test MySQL CDC recovery and schema history
        env:
          RUSTIUM_MYSQL_RECONNECT_SOAK_CYCLES: "3"
        run: >-
          cargo test -p rustium-mysql --test mysql_docker --locked --
          snapshots_streams_reconnects_and_preserves_transaction_order
          --ignored --exact --nocapture

  sqlserver-cdc:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Pull SQL Server 2022
        run: docker pull mcr.microsoft.com/mssql/server:2022-latest
      - name: Test SQL Server CDC portability
        env:
          RUSTIUM_SQLSERVER_RECONNECT_SOAK_CYCLES: "3"
        run: >-
          cargo test -p rustium-sqlserver --test sqlserver_docker --locked --
          snapshots_and_streams_cdc_changes --ignored --exact --nocapture

  kafka-sink:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Test Kafka Sink and Schema Registry
        run: bash scripts/test-kafka-sink.sh

  packaging:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - uses: azure/setup-helm@v4
        with:
          version: v3.18.6
      - name: Build and verify container and Helm chart
        run: bash scripts/test-packaging.sh
