name: Publish crates

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type publish to authorize an irreversible crates.io publication"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    if: inputs.confirm == 'publish'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: clippy,rustfmt
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Verify workspace
        run: |
          cargo fmt --all -- --check
          cargo check --workspace --all-targets --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked
          for package in \
            rustium \
            rustium-config \
            rustium-core \
            rustium-format-avro \
            rustium-format-json \
            rustium-format-protobuf \
            rustium-mysql \
            rustium-postgresql \
            rustium-server \
            rustium-signal-kafka \
            rustium-sink-kafka \
            rustium-sink-stdout \
            rustium-sqlserver \
            rustium-state; do
            cargo package -p "$package" --locked --allow-dirty --list | grep -Fx README.md >/dev/null
          done

  publish-core:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Publish rustium-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p rustium-core --locked --token "$CARGO_REGISTRY_TOKEN"
      - name: Wait for crates.io index propagation
        run: sleep 30

  publish-foundation:
    needs: publish-core
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Publish foundation crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for package in \
            rustium-config \
            rustium-format-avro \
            rustium-format-json \
            rustium-format-protobuf \
            rustium-server \
            rustium-signal-kafka \
            rustium-sink-stdout \
            rustium-state; do
            cargo publish -p "$package" --locked --token "$CARGO_REGISTRY_TOKEN"
            sleep 30
          done

  publish-connectors:
    needs: publish-foundation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Publish connector crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for package in rustium-mysql rustium-postgresql rustium-sqlserver rustium-sink-kafka; do
            cargo publish -p "$package" --locked --token "$CARGO_REGISTRY_TOKEN"
            sleep 60
          done

  publish-cli:
    needs: publish-connectors
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            libssl-dev \
            pkg-config
      - name: Publish rustium CLI
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p rustium --locked --token "$CARGO_REGISTRY_TOKEN"
