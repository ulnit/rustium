name=inventory-json-schema
connector.class=io.debezium.connector.mysql.MySqlConnector
database.hostname=mysql
database.port=3306
database.user=cdc
database.password=${MYSQL_CDC_PASSWORD}
database.include.list=inventory
table.include.list=inventory\..+
topic.prefix=inventory

rustium.sink.type=kafka
rustium.kafka.bootstrap.servers=kafka:9092
rustium.kafka.acks=all

key.converter=io.confluent.connect.json.JsonSchemaConverter
key.converter.schema.registry.url=https://schema-registry:8081
key.converter.basic.auth.credentials.source=USER_INFO
key.converter.basic.auth.user.info=${SCHEMA_REGISTRY_USER}:${SCHEMA_REGISTRY_PASSWORD}
key.converter.auto.register.schemas=true

value.converter=io.confluent.connect.json.JsonSchemaConverter
value.converter.schema.registry.url=https://schema-registry:8081
value.converter.basic.auth.credentials.source=USER_INFO
value.converter.basic.auth.user.info=${SCHEMA_REGISTRY_USER}:${SCHEMA_REGISTRY_PASSWORD}
value.converter.auto.register.schemas=true

rustium.schema.registry.request.timeout.ms=10000
rustium.schema.registry.cache.capacity=1000
offset.storage.file.filename=rustium-json-schema.db
