name=inventory-mysql
connector.class=io.debezium.connector.mysql.MySqlConnector
database.hostname=localhost
database.port=3306
database.user=rustium
database.password=${MYSQL_PASSWORD}
database.server.id=5401
# Rustium currently accepts UTC, Z, Etc/UTC, or +00:00.
# Rustium 当前接受 UTC、Z、Etc/UTC 或 +00:00。
database.connectionTimeZone=UTC
database.ssl.mode=preferred
# Optional TLS material. Choose PEM files or Java JKS/PKCS#12 stores, not both.
# 可选 TLS 材料。PEM 文件与 Java JKS/PKCS#12 存储二选一，不可同时配置。
# database.ssl.ca=/run/secrets/mysql-ca.pem
# database.ssl.cert=/run/secrets/mysql-client.pem
# database.ssl.key=/run/secrets/mysql-client-key.pem
# database.ssl.truststore=/run/secrets/mysql-truststore.jks
# database.ssl.truststore.password=${MYSQL_TRUSTSTORE_PASSWORD}
# database.ssl.keystore=/run/secrets/mysql-client.p12
# database.ssl.keystore.password=${MYSQL_KEYSTORE_PASSWORD}
connect.keep.alive=true
connect.keep.alive.interval.ms=60000
rustium.source.reconnect.max.attempts=10
schema.history.internal.skip.unparseable.ddl=false
# Configure at most one full-UUID regex list for multi-source GTID topologies.
# gtid.source.includes=8f5f4a9a-6b2d-4dd5-915e-1df9d53d2850
gtid.source.filter.dml.events=true
database.include.list=inventory
table.include.list=inventory\.(orders|customers)
topic.prefix=inventory
heartbeat.interval.ms=10000
topic.heartbeat.prefix=__debezium-heartbeat
tombstones.on.delete=true
snapshot.mode=initial
snapshot.fetch.size=1024
snapshot.include.collection.list=inventory\.(orders|customers)
# Optional Debezium-compatible signaling. The signal table must expose id, type, data.
# signal.data.collection=inventory.rustium_signal
# signal.enabled.channels=source,file,in-process,kafka
# signal.file=./rustium-mysql-signals.jsonl
# signal.poll.interval.ms=500
# signal.kafka.bootstrap.servers=localhost:9092
# signal.kafka.topic=inventory-signals
# signal.kafka.groupId=inventory-signal
# incremental.snapshot.chunk.size=1024
# incremental.snapshot.watermarking.strategy=insert_insert
max.queue.size=2048
max.batch.size=512
poll.interval.ms=100
rustium.sink.type=stdout
rustium.state.path=./rustium-mysql.db
rustium.server.bind=127.0.0.1:8080
rustium.log.format=pretty
rustium.log.level=info
