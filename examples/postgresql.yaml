api_version: rustium.io/v1alpha1
kind: Connector

metadata:
  name: inventory-postgresql

source:
  type: postgresql
  hostname: localhost
  port: 5432
  database: inventory
  username: rustium
  password: ${POSTGRES_PASSWORD}
  publication: rustium_publication
  publication_autocreate_mode: disabled
  publish_via_partition_root: false
  # replica_identity_autoset_values:
  #   - table: public\.orders
  #     identity: full
  #   - table: public\.customers
  #     identity: index
  #     index: customers_replica_key
  slot_name: rustium_inventory
  slot_failover: false
  slot_ownership: managed
  offset_mismatch_strategy: no_validation
  lsn_flush_mode: connector
  # PostgreSQL 16+: set origin to any or none to filter replication-origin transactions.
  slot_stream_params: {}
  database_initial_statements: []
  tables:
    include:
      - public\.(orders|customers)
  ssl_mode: prefer
  # ssl_root_cert: /run/secrets/postgresql-ca.pem
  status_update_interval: 10s
  tcp_keepalive: true
  heartbeat_interval: 0s
  heartbeat_topics_prefix: __debezium-heartbeat
  signal_enabled_channels: [source]
  signal_file: file-signals.txt
  signal_poll_interval: 5s
  read_only: false
  hstore_handling_mode: json
  interval_handling_mode: postgres
  include_unknown_datatypes: false
  logical_decoding_messages: false
  # message_prefix_include_list: [orders\..*, audit]
  # message_prefix_exclude_list: [internal\..*]

snapshot:
  mode: initial
  fetch_size: 1024
  include_collections:
    - public\.(orders|customers)

format:
  type: debezium_json
  tombstones_on_delete: true

sink:
  type: stdout
  topic_prefix: inventory

state:
  type: sqlite
  path: ./rustium-postgresql.db

runtime:
  channel_capacity: 2048
  max_batch_size: 512
  flush_interval: 100ms
  shutdown_timeout: 30s
  errors_max_retries: 10
  errors_retry_delay_initial: 300ms
  errors_retry_delay_max: 10s

server:
  bind: 127.0.0.1:8080
  enable_mutations: false

observability:
  log_format: pretty
  log_level: info
  metrics: true
