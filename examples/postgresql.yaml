api_version: rustium.io/v1alpha1
kind: Connector

metadata:
  name: inventory-postgresql

source:
  type: postgresql
  hostname: localhost
  port: 5432
  database: inventory
  username: rustium
  password: ${POSTGRES_PASSWORD}
  publication: rustium_publication
  slot_name: rustium_inventory
  slot_ownership: managed
  tables:
    include:
      - public\.(orders|customers)
  ssl_mode: prefer

snapshot:
  mode: initial
  fetch_size: 1024

format:
  type: debezium_json
  tombstones_on_delete: true

sink:
  type: stdout
  topic_prefix: inventory

state:
  type: sqlite
  path: ./rustium-postgresql.db

runtime:
  channel_capacity: 2048
  max_batch_size: 512
  flush_interval: 100ms
  shutdown_timeout: 30s

server:
  bind: 127.0.0.1:8080
  enable_mutations: false

observability:
  log_format: pretty
  log_level: info
  metrics: true
