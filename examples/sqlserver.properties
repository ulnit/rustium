name=inventory-sqlserver
connector.class=io.debezium.connector.sqlserver.SqlServerConnector
database.hostname=localhost
database.port=1433
database.user=rustium
database.password=${SQLSERVER_PASSWORD}
database.names=inventory
database.encrypt=true
database.trustServerCertificate=true
table.include.list=dbo\.orders
topic.prefix=inventory
tombstones.on.delete=true
snapshot.mode=initial
snapshot.isolation.mode=repeatable_read
snapshot.fetch.size=1024
data.query.mode=direct
streaming.fetch.size=10240
max.queue.size=2048
max.batch.size=512
poll.interval.ms=500
rustium.sink.type=stdout
rustium.state.path=./rustium-sqlserver.db
rustium.server.bind=127.0.0.1:8080
rustium.log.format=pretty
rustium.log.level=info
