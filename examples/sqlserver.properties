name=inventory-sqlserver
connector.class=io.debezium.connector.sqlserver.SqlServerConnector
database.hostname=localhost
database.port=1433
database.user=rustium
database.password=${SQLSERVER_PASSWORD}
database.names=inventory
database.encrypt=true
database.trustServerCertificate=true
table.include.list=dbo\.orders
# Java properties consumes one escape layer; use \\. so selectors retain a literal-dot regex escape.
# SQL Server accepts database.schema.table.column and schema.table.column selectors.
# column.truncate.to.12.chars=inventory\\.dbo\\.orders\\.customer_name
# column.mask.with.8.chars=dbo\\.orders\\.account_number
# column.mask.hash.SHA-256.with.salt.${COLUMN_MASK_SALT}=dbo\\.orders\\.legacy_email
# column.mask.hash.v2.SHA-256.with.salt.${COLUMN_MASK_V2_SALT}=inventory\\.dbo\\.orders\\.email
topic.prefix=inventory
tombstones.on.delete=true
snapshot.mode=initial
snapshot.isolation.mode=repeatable_read
snapshot.fetch.size=1024
snapshot.include.collection.list=inventory\.dbo\.orders
data.query.mode=direct
streaming.fetch.size=10240
max.queue.size=2048
max.batch.size=512
poll.interval.ms=500
# Every incremental snapshot channel requires this table for internal watermarks.
# Enable CDC, grant the connector SELECT and INSERT, and use exactly:
# id nvarchar(42) primary key, type nvarchar(32), data nvarchar(max).
# signal.data.collection=inventory.dbo.rustium_signal
# signal.enabled.channels=source,file,in-process,kafka
# signal.file=sqlserver-signals.jsonl
# signal.poll.interval.ms=5000
# signal.kafka.bootstrap.servers=localhost:9092
# signal.kafka.groupId=inventory-sqlserver-signals
# incremental.snapshot.chunk.size=1024
# incremental.snapshot.allow.schema.changes=false
# incremental.snapshot.watermarking.strategy=insert_insert
rustium.sink.type=stdout
rustium.state.path=./rustium-sqlserver.db
rustium.server.bind=127.0.0.1:8080
rustium.log.format=pretty
rustium.log.level=info
